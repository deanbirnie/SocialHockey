{% extends "layouts/app.html" %}

{% block title %}New Game — SocialHockey{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>Create New Game</h1>
        <a class="btn btn--secondary" href="/admin/dashboard">Back</a>
    </div>

    <form action="/admin/games" method="post" class="form-card">
        <div class="form-group">
            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                required
                autofocus
                placeholder="e.g. Thursday Evening Hockey"
            >
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="game_date">Date</label>
                <input type="date" id="game_date" name="game_date" required>
            </div>
            <div class="form-group">
                <label for="start_time">Start time</label>
                <input type="time" id="start_time" name="start_time" required>
            </div>
            <div class="form-group">
                <label for="end_time">End time</label>
                <input type="time" id="end_time" name="end_time" required>
            </div>
        </div>

        <div class="form-group form-group--narrow">
            <label for="max_players">Max players</label>
            <input
                type="number"
                id="max_players"
                name="max_players"
                value="24"
                min="2"
                max="100"
                required
            >
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Create Game</button>
            <a href="/admin/dashboard" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
