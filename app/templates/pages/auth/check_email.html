{% extends "layouts/public.html" %}

{% block title %}Check Your Email — SocialHockey{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card auth-card--center">
        <h1>Check your email</h1>
        <p>We've sent a login link to <strong>{{ email }}</strong>.</p>
        <p>The link expires in 15 minutes.</p>
        <p class="auth-card__footer"><a href="/auth/login">Back to sign in</a></p>
    </div>
</div>
{% endblock %}
